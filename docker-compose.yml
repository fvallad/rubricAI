services:
  # Nginx Proxy Manager for SSL
  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: moodle_npm
    restart: unless-stopped
    ports:
      - '81:81'
      - '443:443'
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt

  db:
    image: postgres:13-alpine
    container_name: moodle_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: moodle_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  moodle:
    build:
      context: .
      args:
        - MOODLE_VERSION=${MOODLE_VERSION}
    container_name: moodle_app
    restart: unless-stopped
    env_file: .env
    environment:
      - MOODLE_URL=${MOODLE_URL}
      - DB_TYPE=${DB_TYPE}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_PORT=${DB_PORT}
      - RUBRICAI_AI_URL=${RUBRICAI_AI_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./moodledata:/var/www/moodledata
      - moodle_core:/var/www/html
      - ./local/rubricai:/var/www/html/local/rubricai
      - ./conf/moodle.ini:/usr/local/etc/php/conf.d/moodle.ini
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:alpine
    container_name: moodle_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - moodle_core:/var/www/html:ro
      - ./conf/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - moodle

  python_rag:
    build: ./rubricai_ai
    container_name: python_rag
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./rubricai_ai:/app
      - hf_cache:/root/.cache/huggingface

  frontend:
    build: ./frontend
    container_name: astro_frontend
    restart: unless-stopped
    ports:
      - "4321:4321"
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - python_rag

volumes:
  db_data:
    external: true
    name: areteia_db_data
  redis_data:
    external: true
    name: areteia_redis_data
  npm_data:
    external: true
    name: areteia_npm_data
  npm_letsencrypt:
    external: true
    name: areteia_npm_letsencrypt
  moodle_core:
    external: true
    name: areteia_moodle_core
  hf_cache:
