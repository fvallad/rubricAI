name: rubricai_ai

services:
  neo4j:
    image: neo4j:5-community
    container_name: rubricai_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- localhost:7474 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  python_rag:
    build: ./rubricai_ai
    container_name: python_rag
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./rubricai_ai:/app
      - hf_cache:/root/.cache/huggingface
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: astro_frontend
    restart: unless-stopped
    ports:
      - "4321:4321"
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - python_rag

volumes:
  hf_cache:
  neo4j_data:
